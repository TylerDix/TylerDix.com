<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tyler Dix</title>
    <meta name="description" content="Tyler Dix — human being living in Arizona, US.">
    <meta property="og:title" content="Tyler Dix">
    <meta property="og:description" content="human being living in Arizona, US">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://tylerdix.com/">
    <meta property="og:image" content="https://tylerdix.com/images/desert.jpg">
    <meta name="theme-color" content="#000000">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            background: #000;
            color: #fff;
            font-family: "EB Garamond", Georgia, "Times New Roman", serif;
            overflow: hidden;
        }

        /* desert illustration: anchored to the bottom, full art visible, sky extends upward */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: #000 url("/images/desert.jpg") no-repeat center bottom;
            background-size: contain;
        }
        /* soft darkening at the top so the name stays legible against the sky */
        .topfade {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 34vh;
            z-index: 1;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0) 100%);
            pointer-events: none;
        }

        .name {
            position: fixed;
            top: 17vh;
            left: 8vw;
            z-index: 2;
            text-align: left;
        }
        .name h1 {
            font-weight: 600;
            font-size: clamp(1.9rem, 8vw, 3rem);
            letter-spacing: 0.015em;
            line-height: 1.0;
        }
        .name .tagline {
            margin-top: 4px;
            font-style: italic;
            font-size: clamp(0.92rem, 3.4vw, 1.12rem);
            font-weight: 400;
            color: #dadadc;
        }

        /* desktop / landscape: name up near the top of the taller sky */
        @media (min-aspect-ratio: 1/1) {
            .name { top: 8vh; }
        }
    </style>
</head>
<body>
    <div class="bg" aria-hidden="true"></div>
    <div class="topfade" aria-hidden="true"></div>

    <header class="name">
        <h1>Tyler Dix</h1>
        <p class="tagline">human being living in Arizona, US</p>
    </header>
</body>
</html>
