<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tyler Dix</title>
    <meta name="description" content="Tyler Dix — human being living in Arizona, US.">
    <meta property="og:title" content="Tyler Dix">
    <meta property="og:description" content="human being living in Arizona, US">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://tylerdix.com/">
    <meta property="og:image" content="https://tylerdix.com/videos/desert-poster.jpg">
    <meta name="theme-color" content="#0c0c0c">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            background: #0c0c0c;
            color: #fff;
            font-family: "EB Garamond", Georgia, "Times New Roman", serif;
            overflow: hidden;
        }

        /* full-screen looping video; anchored to the top so the dark sky sits behind the name */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            background: #0c0c0c;
        }
        /* top darkening so the name reads against the sky */
        .topfade {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 26vh;
            z-index: 1;
            background: linear-gradient(to bottom, rgba(0,0,0,0.66) 0%, rgba(0,0,0,0.2) 55%, rgba(0,0,0,0) 100%);
            pointer-events: none;
        }

        .name {
            position: fixed;
            top: 4vh;
            left: 8vw;
            z-index: 2;
            text-align: left;
        }
        .name h1 {
            font-weight: 600;
            font-size: clamp(1.8rem, 7.5vw, 3rem);
            letter-spacing: 0.015em;
            line-height: 1.0;
            text-shadow: 0 2px 18px rgba(0, 0, 0, 0.9);
        }
        .name .tagline {
            margin-top: 4px;
            font-style: italic;
            font-size: clamp(0.9rem, 3.3vw, 1.1rem);
            font-weight: 400;
            color: #e0e0e2;
            text-shadow: 0 1px 14px rgba(0, 0, 0, 0.95);
        }
    </style>
</head>
<body>
    <video class="bg" autoplay muted loop playsinline preload="auto"
           poster="/videos/desert-poster.jpg" aria-hidden="true">
        <source src="/videos/desert.mp4" type="video/mp4">
    </video>
    <div class="topfade" aria-hidden="true"></div>

    <header class="name">
        <h1>Tyler Dix</h1>
        <p class="tagline">human being living in Arizona, US</p>
    </header>

    <script>
        // respect reduced-motion: hold on the poster frame instead of playing
        (function () {
            var v = document.querySelector("video.bg");
            if (!v) return;
            if (window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
                v.removeAttribute("autoplay");
                v.addEventListener("loadeddata", function () { try { v.pause(); v.currentTime = 0; } catch (e) {} });
                try { v.pause(); } catch (e) {}
            }
        })();
    </script>
</body>
</html>
