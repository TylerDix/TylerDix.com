<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tyler Dix</title>
    <meta name="description" content="Tyler Dix — human being living in Arizona, US.">
    <meta property="og:title" content="Tyler Dix">
    <meta property="og:description" content="human being living in Arizona, US">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://tylerdix.com/">
    <meta property="og:image" content="https://tylerdix.com/images/desert.jpg">
    <meta name="theme-color" content="#000000">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            background: #000;
            color: #fff;
            font-family: "Space Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        /* desert illustration: anchored to the bottom so the black sky extends upward */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: #000 url("/images/desert.jpg") no-repeat center bottom;
            background-size: contain;
        }
        /* soft darkening at the very top so the name stays legible against the sky */
        .topfade {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 30vh;
            z-index: 1;
            background: linear-gradient(to bottom, rgba(0,0,0,0.78) 0%, rgba(0,0,0,0.35) 45%, rgba(0,0,0,0) 100%);
            pointer-events: none;
        }

        .name {
            position: fixed;
            top: 5.5vh;
            left: 7vw;
            z-index: 2;
            text-align: left;
        }
        .name h1 {
            font-weight: 500;
            font-size: clamp(1.5rem, 6.5vw, 2.6rem);
            letter-spacing: 0.04em;
            line-height: 1.05;
            text-shadow: 0 2px 16px rgba(0, 0, 0, 0.85);
        }
        .name .tagline {
            margin-top: 7px;
            font-size: clamp(0.78rem, 3vw, 0.98rem);
            font-weight: 300;
            letter-spacing: 0.04em;
            color: #d7d7d9;
            text-shadow: 0 1px 12px rgba(0, 0, 0, 0.9);
        }
    </style>
</head>
<body>
    <div class="bg" aria-hidden="true"></div>
    <div class="topfade" aria-hidden="true"></div>

    <header class="name">
        <h1>Tyler Dix</h1>
        <p class="tagline">human being living in Arizona, US</p>
    </header>
</body>
</html>
